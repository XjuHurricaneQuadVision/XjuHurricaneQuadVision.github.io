<a class="button" href="{{ include.link | default: '#' }}"
	{% if include.target %} target="{{ include.target }}"{% endif %}
	{% if include.onclick %} onclick="{{ include.onclick }}"{% endif %}
	{% if include.color %} style="background: {{ include.color }}"{% endif %}>
	{{ include.text | default: "Button" }}{% if include.icon %}&nbsp; {% include icon.html id=include.icon title=include.icon %}{% endif %}
</a>
